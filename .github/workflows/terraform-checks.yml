name: Terraform Checks

# Run on every push and on pull requests targeting main.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  terraform:
    name: Format · Init · Validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra # All terraform commands run from the infra/ directory.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      # terraform fmt -check exits with a non-zero code if any file is not
      # formatted according to Terraform's canonical style. Fix locally with:
      #   terraform fmt -recursive
      - name: Check formatting
        run: terraform fmt -check -recursive

      # terraform init downloads the provider plugins declared in versions.tf.
      # -backend=false skips backend initialization (we have no remote state here).
      - name: Initialize Terraform
        run: terraform init -backend=false

      # terraform validate checks the configuration for syntax errors and
      # internal consistency without connecting to any cloud provider.
      - name: Validate configuration
        run: terraform validate
